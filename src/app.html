<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- SvelteKit injects head content (CSS, svelte:head tags) here. -->
		%sveltekit.head%
	</head>
	<!-- preload-data="hover" prefetches a route's data when the link is hovered. -->
	<body data-sveltekit-preload-data="hover">
		<!-- display: contents keeps this wrapper layout-neutral. -->
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
